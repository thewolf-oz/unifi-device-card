name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. v0.0.6"
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build dist for release
        run: npm run build
        env:
          GITHUB_EVENT_NAME: release
          GITHUB_REF_NAME: ${{ inputs.version }}

      - name: Commit dist if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/unifi-device-card.js package-lock.json
          git diff --cached --quiet || git commit -m "release: prepare ${{ inputs.version }}"
          git push

      - name: Create Git tag
        run: |
          git tag -a "${{ inputs.version }}" -m "${{ inputs.version }}"
          git push origin "${{ inputs.version }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          files: dist/unifi-device-card.js
          generate_release_notes: true
