name: Create Release

# Manual trigger from the GitHub Actions UI.
# Builds the bundle with the given version baked in, commits the
# updated dist file, tags the commit, and creates a GitHub release
# with the compiled JS as the only release asset (required by HACS).

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Validate version format
        run: |
          if ! [[ "${{ inputs.version }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must look like v0.1.0"
            exit 1
          fi

      - name: Check if tag already exists
        run: |
          git fetch --tags
          if git rev-parse "${{ inputs.version }}" >/dev/null 2>&1; then
            echo "Tag ${{ inputs.version }} already exists."
            exit 1
          fi

      - name: Build dist for release
        run: npm run build
        env:
          GITHUB_EVENT_NAME: release
          GITHUB_REF_NAME: ${{ inputs.version }}

      - name: Commit dist if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Only commit the compiled bundle – lock file changes belong in
          # regular dependency-update commits, not in release commits.
          git add dist/unifi-device-card.js
          git diff --cached --quiet || git commit -m "release: prepare ${{ inputs.version }} [skip ci]"
          git push

      - name: Create Git tag
        run: |
          git tag -a "${{ inputs.version }}" -m "${{ inputs.version }}"
          git push origin "${{ inputs.version }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          # HACS downloads this asset when users install / update the plugin.
          # The filename must match hacs.json → "filename": "unifi-device-card.js"
          files: dist/unifi-device-card.js
          generate_release_notes: true
